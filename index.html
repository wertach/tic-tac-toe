<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Tic Tac Toe</h1>
    </header>

    <div class="mode-selector">
      <div class="mode-btns">
        <button class="btn-mode active" id="btn-pvp">👥 2 Players</button>
        <button class="btn-mode" id="btn-ai">🤖 vs AI</button>
      </div>
      <div class="difficulty-selector" id="difficulty-selector" hidden>
        <button class="btn-difficulty active" data-level="easy">Easy</button>
        <button class="btn-difficulty" data-level="medium">Medium</button>
        <button class="btn-difficulty" data-level="hard">Hard</button>
      </div>
    </div>

    <div class="status-bar" id="status">
      Player <span id="current-player" class="player-x">X</span>'s turn
    </div>

    <main class="board" id="board" role="grid" aria-label="Tic Tac Toe board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </main>

    <button class="btn-new-game" id="new-game-btn">New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
